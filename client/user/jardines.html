<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Jardines - Verde Vida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-gray-50">
    <script>auth.redirectIfNotLoggedIn();</script>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main content -->
        <main class="flex-1 p-6 lg:p-8 overflow-y-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Mis Jardines</h1>
                <p class="text-gray-600 mt-1">Gestiona tus espacios y plantas</p>
            </div>

            <!-- Selector de Jardín + Acciones -->
            <div class="mb-8 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <div class="relative inline-block text-left">
                    <button id="gardenSelectorBtn"
                        class="inline-flex justify-center items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <span class="mr-2" id="currentGardenName">Casa Principal</span>
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div id="gardenDropdown" class="hidden origin-top-left absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-10">
                        <div class="py-1" id="gardenList">
                            <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Casa Principal</button>
                            <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Oficina</button>
                        </div>
                        <div class="border-t border-gray-100"></div>
                        <button onclick="openModal('newGardenModal')" class="block w-full text-left px-4 py-2 text-sm text-green-600 hover:bg-gray-100 font-medium">
                            + Añadir nuevo jardín
                        </button>
                    </div>
                </div>
                <button onclick="openModal('newGardenModal')"
                    class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 flex items-center justify-center transition-colors">
                    <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    Añadir Jardín
                </button>
            </div>

            <!-- Detalle del Jardín -->
            <div class="bg-white rounded-lg shadow p-6 mb-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div>
                        <h2 class="text-xl font-bold text-gray-900" id="gardenTitle">Casa Principal</h2>
                        <div class="mt-4 grid grid-cols-2 gap-4">
                            <div class="border rounded-md p-4">
                                <h3 class="text-sm font-medium text-gray-500">Espacios</h3>
                                <div class="mt-2 flex flex-wrap gap-2" id="gardenSpaces">
                                    <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">Balcón</span>
                                    <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">Sala</span>
                                </div>
                            </div>
                            <div class="border rounded-md p-4">
                                <h3 class="text-sm font-medium text-gray-500">Condiciones</h3>
                                <div class="mt-2 flex flex-wrap gap-2" id="gardenConditions">
                                    <span class="px-2 py-1 bg-yellow-100 text-yellow-800 text-xs rounded-full">Sol parcial</span>
                                    <span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">Húmedo</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="border-l pl-0 lg:pl-6 border-l-0 lg:border-l border-t lg:border-t-0 pt-4 lg:pt-0">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-medium text-gray-900">Resumen</h3>
                            <button class="text-sm text-green-600 hover:text-green-700">Editar jardín</button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-500">Total plantas</p>
                                <p class="text-2xl font-bold text-gray-900" id="totalPlants">0</p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Tareas hoy</p>
                                <p class="text-2xl font-bold text-gray-900" id="todayTasks">0</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Espacios del Jardín -->
            <div class="mb-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-900">Espacios</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="spacesContainer">
                <!-- Espacios renderizados con JS -->
            </div>
        </main>
    </div>

    <!-- Modal: Crear Nuevo Jardín -->
    <div id="newGardenModal" class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-md w-full p-6 m-4">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Crear Nuevo Jardín</h3>
            <form class="space-y-4" onsubmit="event.preventDefault(); closeModal('newGardenModal');">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del jardín</label>
                    <input type="text" placeholder="Ej: Casa Principal, Oficina..."
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 border px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Condiciones generales</label>
                    <div class="mt-2 flex flex-wrap gap-2">
                        <label class="inline-flex items-center px-3 py-1.5 border rounded-full cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-green-600 rounded">
                            <span class="ml-2 text-sm text-gray-700">Sol directo</span>
                        </label>
                        <label class="inline-flex items-center px-3 py-1.5 border rounded-full cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-green-600 rounded">
                            <span class="ml-2 text-sm text-gray-700">Sol parcial</span>
                        </label>
                        <label class="inline-flex items-center px-3 py-1.5 border rounded-full cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-green-600 rounded">
                            <span class="ml-2 text-sm text-gray-700">Sombra</span>
                        </label>
                        <label class="inline-flex items-center px-3 py-1.5 border rounded-full cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-green-600 rounded">
                            <span class="ml-2 text-sm text-gray-700">Húmedo</span>
                        </label>
                        <label class="inline-flex items-center px-3 py-1.5 border rounded-full cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-green-600 rounded">
                            <span class="ml-2 text-sm text-gray-700">Seco</span>
                        </label>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button type="button" onclick="closeModal('newGardenModal')"
                        class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 border rounded-md">
                        Cancelar
                    </button>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
                        Crear Jardín
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Añadir Planta -->
    <div id="addPlantModal" class="hidden fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-md w-full p-6 m-4">
            <h3 class="text-lg font-medium text-gray-900 mb-4">Añadir Planta</h3>
            <form class="space-y-4" onsubmit="event.preventDefault(); closeModal('addPlantModal');">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre de la planta</label>
                    <input type="text" placeholder="Ej: Orquídea, Monstera..."
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 border px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Espacio</label>
                    <select class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 border px-3 py-2">
                        <option>Balcón</option>
                        <option>Sala</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Estado de salud</label>
                    <select class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 border px-3 py-2">
                        <option>Saludable</option>
                        <option>Enferma</option>
                        <option>En recuperación</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button type="button" onclick="closeModal('addPlantModal')"
                        class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 border rounded-md">
                        Cancelar
                    </button>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
                        Añadir
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Cargar sidebar
        fetch('/components/sidebar.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;
            });

        // Toggle dropdown de selector de jardín
        document.getElementById('gardenSelectorBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('gardenDropdown').classList.toggle('hidden');
        });
        document.addEventListener('click', function() {
            document.getElementById('gardenDropdown').classList.add('hidden');
        });

        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // Datos mock temporales
        const mockSpaces = [
            {
                nombre: 'Balcón',
                plantas: [
                    { nombre: 'Lavanda', imagen: '/orquidea.jpeg', estado: 'Saludable' },
                    { nombre: 'Rosa', imagen: null, estado: 'Saludable' },
                ]
            },
            {
                nombre: 'Sala',
                plantas: [
                    { nombre: 'Monstera', imagen: null, estado: 'En recuperación' },
                ]
            }
        ];

        function renderSpaces(spaces) {
            const container = document.getElementById('spacesContainer');
            let totalPlants = 0;

            const spacesHtml = spaces.map(space => {
                totalPlants += space.plantas.length;
                const plantasHtml = space.plantas.map(planta => `
                    <div class="border rounded-lg p-3 hover:shadow-md transition-shadow">
                        <div class="flex items-center">
                            <img src="${planta.imagen || '/logo.png'}" alt="${planta.nombre}"
                                class="h-12 w-12 rounded-full object-cover flex-shrink-0">
                            <div class="ml-3">
                                <h4 class="text-sm font-medium text-gray-900">${planta.nombre}</h4>
                                <span class="inline-block mt-1 px-2 py-0.5 text-xs rounded-full ${
                                    planta.estado === 'Saludable' ? 'bg-green-100 text-green-800' :
                                    planta.estado === 'Enferma' ? 'bg-red-100 text-red-800' :
                                    'bg-yellow-100 text-yellow-800'
                                }">${planta.estado}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="bg-white rounded-lg shadow">
                        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                            <h3 class="text-lg font-medium text-gray-900">${space.nombre}</h3>
                            <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm">
                                ${space.plantas.length} planta${space.plantas.length !== 1 ? 's' : ''}
                            </span>
                        </div>
                        <div class="p-4 space-y-3">
                            ${plantasHtml}
                            <button onclick="openModal('addPlantModal')"
                                class="mt-2 w-full py-2 text-sm text-green-600 hover:text-green-700 flex items-center justify-center border border-dashed border-green-300 rounded-md hover:bg-green-50 transition-colors">
                                <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                                Añadir planta
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Tarjeta "Añadir Espacio"
            const addSpaceCard = `
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center text-gray-500 hover:border-green-400 hover:text-green-600 cursor-pointer transition-colors"
                    onclick="openModal('newGardenModal')">
                    <svg class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    <span class="text-sm font-medium">Añadir nuevo espacio</span>
                </div>
            `;

            container.innerHTML = spacesHtml + addSpaceCard;
            document.getElementById('totalPlants').textContent = totalPlants;
            document.getElementById('todayTasks').textContent = '2'; // mock
        }

        renderSpaces(mockSpaces);
    </script>
</body>
</html>
