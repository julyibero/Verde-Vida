<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Verde Vida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-gray-50">
    <script>auth.redirectIfNotLoggedIn();</script>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main content -->
        <main class="flex-1 p-6 lg:p-8 overflow-y-auto">
            <!-- Saludo -->
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900" id="userGreeting">¡Hola!</h1>
                <p class="text-gray-600 mt-1">Estas son tus plantas de hoy</p>
            </div>

            <!-- Estado vacío -->
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16">
                <div class="text-7xl mb-4">🪴</div>
                <h2 class="text-xl font-semibold text-gray-900 mb-2">Aún no tienes jardines</h2>
                <p class="text-gray-500 mb-6 text-center max-w-md">
                    Crea tu primer jardín virtual y empieza a registrar el cuidado de tus plantas.
                </p>
                <a href="/user/jardines.html"
                    class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium transition-colors">
                    Crear mi primer jardín
                </a>
            </div>

            <!-- Sección "Hoy" -->
            <div id="todaySection" class="mb-8">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">Hoy</h2>
                <div id="tasksContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Las tareas se renderizan con JS -->
                </div>
            </div>

            <!-- Resumen -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-sm text-gray-500">Jardines</p>
                    <p class="text-3xl font-bold text-gray-900" id="gardenCount">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-sm text-gray-500">Plantas</p>
                    <p class="text-3xl font-bold text-gray-900" id="plantCount">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <p class="text-sm text-gray-500">Tareas pendientes</p>
                    <p class="text-3xl font-bold text-gray-900" id="taskCount">0</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Cargar sidebar
        fetch('/components/sidebar.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('sidebar-container').innerHTML = html;
            });

        // Cargar datos del usuario
        auth.getMe().then(data => {
            if (data && data.user) {
                document.getElementById('userGreeting').textContent = `¡Hola ${data.user.nombre}!`;
            }
        }).catch(() => {
            // Si falla, el redirectIfNotLoggedIn ya debería haber actuado
        });

        // Datos mock temporales para el MVP (reemplazar con fetch real en siguiente fase)
        const mockTasks = [
            {
                planta: 'Orquídea Phalaenopsis',
                espacio: 'Balcón',
                accion: 'Regar',
                imagen: '/orquidea.jpeg',
                atrasada: false
            },
            {
                planta: 'Monstera Deliciosa',
                espacio: 'Sala',
                accion: 'Abonar',
                imagen: null,
                atrasada: true
            }
        ];

        function renderTasks(tasks) {
            const container = document.getElementById('tasksContainer');
            const emptyState = document.getElementById('emptyState');
            const todaySection = document.getElementById('todaySection');

            if (!tasks || tasks.length === 0) {
                todaySection.classList.add('hidden');
                emptyState.classList.remove('hidden');
                document.getElementById('gardenCount').textContent = '0';
                document.getElementById('plantCount').textContent = '0';
                document.getElementById('taskCount').textContent = '0';
                return;
            }

            emptyState.classList.add('hidden');
            todaySection.classList.remove('hidden');

            container.innerHTML = tasks.map(task => `
                <div class="bg-white rounded-lg shadow p-4 flex items-center space-x-4 ${task.atrasada ? 'border-l-4 border-yellow-400' : ''}">
                    <img src="${task.imagen || '/logo.png'}" alt="${task.planta}"
                        class="h-14 w-14 rounded-full object-cover flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-900 truncate">${task.accion} ${task.planta}</p>
                        <p class="text-xs text-gray-500">${task.espacio}</p>
                        ${task.atrasada ? '<span class="text-xs text-yellow-600 font-medium">Atrasada</span>' : ''}
                    </div>
                    <button onclick="markDone(this)"
                        class="flex-shrink-0 px-3 py-1.5 bg-green-600 text-white text-sm rounded-md hover:bg-green-700 transition-colors">
                        Listo
                    </button>
                </div>
            `).join('');

            // Actualizar contadores mock
            document.getElementById('gardenCount').textContent = '1';
            document.getElementById('plantCount').textContent = '2';
            document.getElementById('taskCount').textContent = tasks.length;
        }

        function markDone(btn) {
            const card = btn.closest('div.bg-white');
            card.classList.add('opacity-50');
            btn.textContent = '✓ Hecho';
            btn.disabled = true;
            btn.classList.add('bg-gray-400');
            btn.classList.remove('bg-green-600', 'hover:bg-green-700');
        }

        // Renderizar tareas mock (en fase 2 se conectará al endpoint real)
        renderTasks(mockTasks);
    </script>
</body>
</html>
