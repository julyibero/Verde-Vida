<script>
    (function highlightActiveNav() {
        const path = window.location.pathname;
        const page = path.split('/').pop().replace('.html', '');
        const navMap = {
            'dashboard': 'nav-dashboard',
            'jardines': 'nav-jardines',
            'consultas': 'nav-consultas',
            'configuracion': 'nav-configuracion',
        };
        const activeId = navMap[page];
        if (activeId) {
            const el = document.getElementById(activeId);
            if (el) {
                el.classList.remove('text-gray-700', 'hover:bg-green-50', 'hover:text-green-700');
                el.classList.add('bg-green-100', 'text-green-700');
            }
        }
    })();
</script>
